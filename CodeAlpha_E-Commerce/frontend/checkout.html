<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Shopify</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-top">
            <h1>Shopify</h1>
            <div class="user-menu"></div>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Checkout</h2>
            
            <div class="grid-2">
                <div>
                    <form id="checkout-form">
                        <h3>Shipping Address</h3>
                        <div class="form-group">
                            <label for="address">Street Address</label>
                            <input type="text" id="address" required>
                        </div>
                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" id="city" required>
                        </div>
                        <div class="form-group">
                            <label for="state">State/Province</label>
                            <input type="text" id="state" required>
                        </div>
                        <div class="form-group">
                            <label for="postal-code">Postal Code</label>
                            <input type="text" id="postal-code" required>
                        </div>
                        <div class="form-group">
                            <label for="country">Country</label>
                            <input type="text" id="country" required>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Place Order</button>
                    </form>
                </div>
                <div>
                    <div class="cart-summary">
                        <h3>Order Summary</h3>
                        <div id="order-items" style="max-height: 300px; overflow-y: auto; margin-bottom: 1rem;">
                            <!-- Items will be loaded here -->
                        </div>
                        <div style="margin: 1rem 0; padding: 1rem 0; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                <span>Subtotal:</span>
                                <span id="subtotal">$0.00</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                <span>Shipping:</span>
                                <span id="shipping">$10.00</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: bold; margin-top: 1rem;">
                                <span>Total:</span>
                                <span id="total">$0.00</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 E-Shop. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        let cartItems = [];

        async function loadCheckout() {
            if (!api.getToken()) {
                window.location.href = 'login.html';
                return;
            }

            const result = await api.getCartItems();
            if (!result.success || result.data.length === 0) {
                document.querySelector('form').innerHTML = '<p class="error-message">Cart is empty</p>';
                return;
            }

            cartItems = result.data;
            renderOrderSummary();
        }

        function renderOrderSummary() {
            const container = document.getElementById('order-items');
            const subtotal = cartItems.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
            const shipping = 10;
            const total = subtotal + shipping;

            container.innerHTML = cartItems.map(item => `
                <div class="cart-item" style="background: transparent; border: none; padding: 0.5rem 0;">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.product.name}</div>
                        <div style="font-size: 0.9rem; color: #666;">Qty: ${item.quantity}</div>
                    </div>
                    <div style="font-weight: bold;">${formatPrice(item.product.price * item.quantity)}</div>
                </div>
            `).join('');

            document.getElementById('subtotal').textContent = formatPrice(subtotal);
            document.getElementById('total').textContent = formatPrice(total);
        }

        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const orderData = {
                total_amount: cartItems.reduce((sum, item) => sum + (item.product.price * item.quantity), 0) + 10,
                shipping_address: document.getElementById('address').value,
                shipping_city: document.getElementById('city').value,
                shipping_state: document.getElementById('state').value,
                shipping_postal_code: document.getElementById('postal-code').value,
                shipping_country: document.getElementById('country').value,
            };

            const result = await api.createOrder(orderData);
            if (result.success) {
                showMessage('Order placed successfully!', 'success');
                updateCartCount();
                setTimeout(() => {
                    window.location.href = `order-confirmation.html?id=${result.data.id}`;
                }, 2000);
            } else {
                showMessage(result.error, 'error');
            }
        });

        document.addEventListener('DOMContentLoaded', loadCheckout);
    </script>
</body>
</html>
