<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - Shopify</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-top">
            <h1>Shopify</h1>
            <div class="user-menu"></div>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Order Confirmation</h2>
            
            <div id="order-content" style="max-width: 600px; margin: 0 auto;">
                <!-- Order details will be loaded here -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 E-Shop. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        async function loadOrder() {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('id');

            if (!orderId) {
                document.getElementById('order-content').innerHTML = '<div class="error-message">Invalid order</div>';
                return;
            }

            const result = await api.getOrder(orderId);
            if (result.success) {
                const order = result.data;
                const itemsHtml = order.items.map(item => `
                    <div style="display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #eee;">
                        <span>${item.product.name} (x${item.quantity})</span>
                        <span>${formatPrice(item.product.price * item.quantity)}</span>
                    </div>
                `).join('');

                document.getElementById('order-content').innerHTML = `
                    <div class="success-message" style="text-align: center; margin-bottom: 2rem;">
                        <h3>✓ Order Placed Successfully!</h3>
                        <p>Thank you for your purchase. Your order has been confirmed.</p>
                    </div>

                    <div style="background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                        <h3>Order Details</h3>
                        <div style="margin: 1rem 0;">
                            <div style="display: flex; justify-content: space-between; padding: 0.5rem 0;">
                                <strong>Order ID:</strong>
                                <span>#${order.id}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; padding: 0.5rem 0;">
                                <strong>Order Date:</strong>
                                <span>${new Date(order.created_at).toLocaleDateString()}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; padding: 0.5rem 0;">
                                <strong>Status:</strong>
                                <span style="text-transform: capitalize;">${order.status}</span>
                            </div>
                        </div>

                        <h4 style="margin-top: 2rem; margin-bottom: 1rem;">Items Ordered</h4>
                        <div>${itemsHtml}</div>

                        <h4 style="margin-top: 2rem; margin-bottom: 1rem;">Shipping Address</h4>
                        <div style="background: #f5f5f5; padding: 1rem; border-radius: 5px;">
                            <p>${order.shipping_address}</p>
                            <p>${order.shipping_city}, ${order.shipping_state} ${order.shipping_postal_code}</p>
                            <p>${order.shipping_country}</p>
                        </div>

                        <div style="display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 1rem; border-top: 2px solid #eee; font-size: 1.3rem; font-weight: bold;">
                            <span>Total:</span>
                            <span>${formatPrice(order.total_amount)}</span>
                        </div>

                        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                            <button class="btn btn-primary" style="flex: 1;" onclick="continueShopping()">Continue Shopping</button>
                            <button class="btn" style="flex: 1;" onclick="viewOrders()">View All Orders</button>
                        </div>
                    </div>
                `;
            } else {
                document.getElementById('order-content').innerHTML = `<div class="error-message">${result.error}</div>`;
            }
        }

        function continueShopping() {
            window.location.href = 'products.html';
        }

        function viewOrders() {
            window.location.href = 'dashboard.html';
        }

        document.addEventListener('DOMContentLoaded', loadOrder);
    </script>
</body>
</html>
